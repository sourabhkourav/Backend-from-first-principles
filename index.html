<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Backend from First Principles — Full Q&A by Video</title>
  <style>
    :root {
      --bg: #0f1115;
      --card: #171a21;
      --border: #2a2e38;
      --text: #e8e9ed;
      --muted: #9aa0ac;
      --accent: #7aa2f7;
      --accent-dark: #5a7fd0;
      --answer-bg: #12161c;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 24px 16px 80px;
    }

    .wrap {
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.35rem;
      margin-bottom: 4px;
    }

    .sub {
      color: var(--muted);
      font-size: 0.85rem;
      margin-bottom: 18px;
    }

    .video-select {
      margin-bottom: 16px;
    }

    select#videoPicker {
      width: 100%;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 0.95rem;
      appearance: none;
      cursor: pointer;
    }

    .nav-buttons {
      display: flex;
      gap: 8px;
      margin-top: 10px;
    }

    .nav-buttons button {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .nav-buttons button:hover:not(:disabled) {
      background: #1c2029;
    }

    .nav-buttons button:disabled {
      opacity: 0.35;
      cursor: default;
    }

    .search-box {
      margin: 14px 0 18px;
    }

    input#searchBox {
      width: 100%;
      background: var(--card);
      color: var(--text);
      border: 1px solid var(--border);
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 0.88rem;
    }

    input#searchBox::placeholder {
      color: var(--muted);
    }

    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      border-bottom: 1px solid var(--border);
      padding-bottom: 16px;
      margin-bottom: 20px;
    }

    button.toggle-all {
      background: var(--accent);
      color: #0f1115;
      border: none;
      font-weight: 600;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
    }

    button.toggle-all:hover {
      background: var(--accent-dark);
    }

    .count {
      color: var(--muted);
      font-size: 0.85rem;
    }

    .video-title {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--accent);
      margin-bottom: 4px;
    }

    .video-meta {
      color: var(--muted);
      font-size: 0.82rem;
      margin-bottom: 14px;
    }

    .qcard {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 10px;
      overflow: hidden;
    }

    .qhead {
      padding: 14px 16px;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
    }

    .qhead:hover {
      background: #1c2029;
    }

    .qtext {
      font-size: 0.95rem;
      line-height: 1.4;
    }

    .qnum {
      color: var(--accent);
      font-weight: 700;
      margin-right: 6px;
    }

    .chevron {
      color: var(--muted);
      transition: transform 0.2s ease;
      flex-shrink: 0;
      font-size: 0.8rem;
    }

    .qcard.open .chevron {
      transform: rotate(90deg);
    }

    .answer {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s ease;
      background: var(--answer-bg);
      border-top: 1px solid var(--border);
    }

    .answer-inner {
      padding: 0 16px;
      font-size: 0.9rem;
      line-height: 1.55;
      color: var(--muted);
    }

    .qcard.open .answer {
      max-height: 500px;
    }

    .qcard.open .answer-inner {
      padding: 14px 16px 16px;
      color: var(--text);
    }

    .no-results {
      color: var(--muted);
      font-size: 0.9rem;
      padding: 20px 0;
      text-align: center;
    }
  </style>
</head>

<body>
  <div class="wrap">
    <h1>Backend from First Principles — Full Q&A by Video</h1>
    <div class="sub">Sriniously's playlist, 70-100 questions per video (75 each). Pick a video, search within it, or
      step through with Previous/Next.</div>

    <div class="video-select">
      <select id="videoPicker"></select>
      <div class="nav-buttons">
        <button id="prevBtn">← Previous video</button>
        <button id="nextBtn">Next video →</button>
      </div>
    </div>

    <div class="search-box">
      <input type="text" id="searchBox" placeholder="Filter questions in this video...">
    </div>

    <div class="video-title" id="videoTitle"></div>
    <div class="video-meta" id="videoMeta"></div>

    <div class="toolbar">
      <button class="toggle-all" id="toggleAllBtn">Show All Answers</button>
      <span class="count" id="countLabel"></span>
    </div>

    <div id="content"></div>
  </div>

    let currentIndex = 0;

    const picker = document.getElementById('videoPicker');
    videos.forEach((v, i) => {
      const opt = document.createElement('option');
      opt.value = i;
      opt.textContent = `${i + 1}. ${v.title} (${v.items.length} Qs)`;
      picker.appendChild(opt);
    });

    function renderVideo(index) {
      currentIndex = index;
      picker.value = index;
      document.getElementById('searchBox').value = '';
      const video = videos[index];

      document.getElementById('videoTitle').textContent = video.title;
      document.getElementById('videoMeta').textContent = `Video ${index + 1} of ${videos.length} · ${video.items.length} questions`;

      renderList(video.items);

      document.getElementById('prevBtn').disabled = index === 0;
      document.getElementById('nextBtn').disabled = index === videos.length - 1;
    }

    function renderList(items) {
      const contentEl = document.getElementById('content');
      contentEl.innerHTML = '';

      if (items.length === 0) {
        contentEl.innerHTML = '<div class="no-results">No matching questions.</div>';
        document.getElementById('countLabel').textContent = '0 questions';
        return;
      }

      items.forEach(([q, a], i) => {
        const card = document.createElement('div');
        card.className = 'qcard';

        const head = document.createElement('div');
        head.className = 'qhead';
        head.innerHTML = `<div class="qtext"><span class="qnum">Q${i + 1}.</span>${q}</div><span class="chevron">▶</span>`;
        head.addEventListener('click', () => {
          card.classList.toggle('open');
          updateToggleAllLabel();
        });

        const answer = document.createElement('div');
        answer.className = 'answer';
        const answerInner = document.createElement('div');
        answerInner.className = 'answer-inner';
        answerInner.innerHTML = a;
        answer.appendChild(answerInner);

        card.appendChild(head);
        card.appendChild(answer);
        contentEl.appendChild(card);
      });

      document.getElementById('countLabel').textContent = items.length + ' questions';
      document.getElementById('toggleAllBtn').textContent = 'Show All Answers';
    }

    function updateToggleAllLabel() {
      const cards = document.querySelectorAll('.qcard');
      const openCount = document.querySelectorAll('.qcard.open').length;
      document.getElementById('toggleAllBtn').textContent = (openCount === cards.length && cards.length > 0) ? 'Hide All Answers' : 'Show All Answers';
    }

    picker.addEventListener('change', (e) => renderVideo(parseInt(e.target.value)));
    document.getElementById('prevBtn').addEventListener('click', () => { if (currentIndex > 0) renderVideo(currentIndex - 1); });
    document.getElementById('nextBtn').addEventListener('click', () => { if (currentIndex < videos.length - 1) renderVideo(currentIndex + 1); });

    document.getElementById('toggleAllBtn').addEventListener('click', () => {
      const cards = document.querySelectorAll('.qcard');
      const allOpen = document.querySelectorAll('.qcard.open').length === cards.length;
      cards.forEach(c => c.classList.toggle('open', !allOpen));
      updateToggleAllLabel();
    });

    document.getElementById('searchBox').addEventListener('input', (e) => {
      const term = e.target.value.trim().toLowerCase();
      const video = videos[currentIndex];
      if (!term) {
        renderList(video.items);
        return;
      }
      const filtered = video.items.filter(([q, a]) => q.toLowerCase().includes(term) || a.toLowerCase().includes(term));
      renderList(filtered);
    });

    renderVideo(0);
  </script>
